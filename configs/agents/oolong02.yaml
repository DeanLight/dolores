  # ── 10. d0: count something until the end of episode N ───────────────────────
  - name: end to end count until episode
    content: |
      **Task:** How many dice rolls did player Michael make until the end of episode 3? You have the DnD game text in `document`.

      "Until the end of episode 3" means I need to sum Michael's rolls across episodes 1, 2, and 3 — NOT just episode 3 alone. I will extract all episodes, take the first 3, and count concurrently across all of them.

      <repl>
      episodes = plan_exec(
          """Extract all episodes from the DnD game text in `document`.
          Each episode is delimited by `[START OF EPISODE]` and `[END OF EPISODE]`.
          Return a list of strings, where each string is the text of an episode (without the delimiters).
          Be careful to ignore the preamble at the start of the document.""",
          document=document,
          namespaces=["splitting episodes"]
      )
      # "Until end of episode 3" = episodes 1, 2, and 3 (indices 0, 1, 2)
      target_episodes = episodes[:3]
      print(f"Total episodes found: {len(episodes)}, counting across first {len(target_episodes)}.")
      </repl>

      <observation>
      Total episodes found: 5, counting across first 3.
      </observation>

      Good. Now I'll count Michael's rolls in each of the first 3 episodes concurrently, then sum.

      <repl>
      for ep in target_episodes:
          plan_exec.add_task(
              """Count how many dice rolls player Michael or his character Eldrin made in the DnD episode
              text in `episode`. Return the count as an integer.""",
              episode=Var(ep, "DnD episode text"),
              namespaces=["episode qa"]
          )
      rolls_per_episode = plan_exec.run_all()
      total = sum(rolls_per_episode)
      print(f"Rolls per episode: {rolls_per_episode}")
      print(f"Total rolls until end of episode 3: {total}")
      </repl>

      <observation>
      Rolls per episode: [12, 8, 15]
      Total rolls until end of episode 3: 35
      </observation>

      <repl>
      FinalAnswer(total)
      </repl>
