  - name: episode qa 3
    content: |
      **Task:** What is the first spell cast in the following DnD episode text? The episode text is given in the variable `episode`. Return the name of the spell as a string, or 'None' if no spells were cast in this episode.

      The transcript is free-form dialogue, so I will use `llm` calls to identify spells rather than trying to match specific patterns. Since the episode text might be large, I will first check the length of the episode text to see whether it is feasible to give it to an `llm` call directly.

      <repl>
      print(len(episode))
      </repl>

      <observation>
      54321
      </observation>

      The episode text is 54,321 characters long, which is too large for an `llm` call. I will have to split the episode text into smaller chunks and give each chunk to an `llm` call separately. I will ask each `llm` call to find the first spell cast in the chunk and print the results. Since the chunks are in order, the first spell found in the first chunk that contains a spell will be the first spell cast in the episode.

      <repl>
      import semchunk
      chunks = semchunk.chunk(episode, chunk_size=5000, token_counter=len)
      spells_found = llm.batch([
          f"What is the first spell cast in the following DnD text chunk (if any)?\n\n{chunk}"
          for chunk in chunks
      ])
      for response in spells_found:
          print(response)
      </repl>

